<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Pong Counter</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body class="font-['Montserrat']">
    <div class="flex flex-col items-center mt-10">
        <div class="shadow-md bg-white w-120 overflow-hidden">
            <div class="flex  items-center">
                <img src="/src/From-Basement-to-Glory-The-Rise-and-Evolution-of-Ping-Pong-scaled.jpg"
                    class="w-full h-60" alt="Scoreboard">
            </div>
            <div class="flex flex-start items-center px-3 py-2">
                <p class="text-xs font-bold">Ping Pong Score Keeper</p>
            </div>
        </div>
        <div class="shadow-md bg-white w-120 mt-1">
            <div class="px-3 py-3">
                <p class="text-4xl font-gray-700 font-bold display pt-2"><span id="player_one">0</span> to <span
                        id="player_two">0</span></p>
                <p class="text-sm font-gray-700 font-light pb-2">Use the Buttons Below to Update the Score.</p>
                <p class="text-md font-gray-700 font-bold inline-block py-2 pr-2">Playing To: </p>
                <select
                    id="score_limit"
                    class="border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 inline-block">
                    <option value="5">5 points</option>
                    <option value="10">10 points</option>
                    <option value="15">15 points</option>
                    <option value="20">20 points</option>
                </select>
            </div>

            <div class="flex items-center justify-around">
                <button id="Player_one_button"
                    class="bg-green-600 hover:bg-green-700 text-white font-semibold w-full py-2 mx-[1px] rounded-lg shadow-md transition duration-200  disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-green-600">
                    +1 Player One
                </button>
                <button id="Player_two_button"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold w-full py-2 mx-[1px] rounded-lg shadow-md transition duration-200  disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-blue-600">
                    +1 Player Two
                </button>
                <button
                    id="reset"
                    class="bg-red-600 hover:bg-red-700 text-white font-semibold w-full py-2 mx-[1px] rounded-lg shadow-md transition duration-200">
                    Restart Game
                </button>
            </div>

        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
